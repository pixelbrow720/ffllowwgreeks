name: nightly

on:
  schedule:
    # 03:00 UTC every day = ~10:00 WIB. Picks a quiet hour for the
    # runner pool; nothing time-sensitive about the slot.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ws-stress:
    name: ws_stress against demo stack
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: prepare .env
        run: cp .env.example .env

      - name: bring up demo stack
        run: |
          docker compose -f deploy/docker-compose.yml --profile demo up -d --build
          echo "stack started"

      - name: wait for api readiness
        run: |
          set +e
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health/ready >/dev/null; then
              echo "ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::api never became ready"
          docker compose -f deploy/docker-compose.yml --profile demo logs --tail=200
          exit 1

      - name: wait for synth_state to fan out
        # ws_stress measures snapshot.replay seeds + live publishes;
        # we need synth_state to have published at least one round so
        # the replay path has something to replay.
        run: sleep 5

      # Three escalating tiers. Each tier exits non-zero if the api
      # couldn't sustain the load, which fails the workflow.

      - name: ws_stress 100c / 30s (smoke)
        run: |
          go run ./scripts/ws_stress \
            -clients 100 \
            -duration 30s \
            -ramp-up 5s \
            -url ws://localhost:8080/ws/live

      - name: ws_stress 500c / 60s (soak)
        run: |
          go run ./scripts/ws_stress \
            -clients 500 \
            -duration 60s \
            -ramp-up 15s \
            -url ws://localhost:8080/ws/live

      - name: ws_stress 1000c / 60s (target)
        run: |
          go run ./scripts/ws_stress \
            -clients 1000 \
            -duration 60s \
            -ramp-up 30s \
            -url ws://localhost:8080/ws/live

      - name: capture metrics + logs on failure
        if: failure()
        run: |
          echo "─── /metrics (last lines) ────────────────────────────"
          curl -s http://localhost:8080/metrics | tail -100 || true
          echo "─── docker compose ps ────────────────────────────────"
          docker compose -f deploy/docker-compose.yml --profile demo ps
          echo "─── recent logs ──────────────────────────────────────"
          docker compose -f deploy/docker-compose.yml --profile demo logs --tail=500

      - name: tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml --profile demo down -v
