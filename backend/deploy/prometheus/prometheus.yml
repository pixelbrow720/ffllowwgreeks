global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: flowgreeks-dev

rule_files:
  - /etc/prometheus/flowgreeks.rules.yml

scrape_configs:
  - job_name: flowgreeks-api
    static_configs:
      - targets: ["api:8080"]
        labels: { service: api }
    metrics_path: /metrics

  - job_name: flowgreeks-ingest
    static_configs:
      - targets: ["ingest:9091"]
        labels: { service: ingest }
    metrics_path: /metrics

  - job_name: flowgreeks-compute
    static_configs:
      - targets: ["compute:9092"]
        labels: { service: compute }
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
